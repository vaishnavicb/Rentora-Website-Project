<svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="48" height="48" fill="white"/>
  
  <!-- Gradient background -->
  <circle cx="24" cy="24" r="22" fill="url(#gradient1)" opacity="0.15"/>

  <!-- Main Geometric Shape - Stylized "R" -->
  <g>
    <!-- Vertical Line -->
    <rect x="12" y="8" width="4" height="32" fill="#2563eb" rx="2"/>

    <!-- Top Curve -->
    <path
      d="M 16 10 Q 24 10 24 18 Q 24 24 16 24"
      fill="none"
      stroke="#2563eb"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Diagonal Leg -->
    <path
      d="M 24 24 L 32 40"
      stroke="#2563eb"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Circular Element - representing Loop/Connection -->
  <circle
    cx="32"
    cy="16"
    r="4"
    fill="#7c3aed"
    opacity="0.8"
  />

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
</svg>